  ? The motor vibrates the belt while a strobe light flashes at the same frequency.
    When the belt appears to stand still (frozen), you have found the resonant frequency.\n\nUse
    the frequency buttons to sweep through values until the belt looks stationary,
    then lock the reading.
  : El motor hace vibrar la correa mientras una luz estroboscópica parpadea a la misma
    frecuencia. Cuando la correa parece quedarse quieta (congelada), has encontrado
    la frecuencia de resonancia.\n\nUsa los botones de frecuencia para recorrer los
    valores hasta que la correa parezca estar inmóvil, luego bloquea la lectura.
