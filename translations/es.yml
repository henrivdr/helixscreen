  ? Uneven belt tension causes print artifacts like layer shifts, VFAs (vertical fine
    artifacts), and ringing.\n\nThis tool vibrates each belt path and measures the
    resonant frequency \u2014 matched frequencies mean balanced tension.\n\nFor CoreXY,
    Path A and B should be within a few Hz of each other.
  : La tensión desigual de la correa causa defectos de impresión como desplazamientos
    de capa, VFA (artefactos verticales finos) y ringing.\n\nEsta herramienta hace
    vibrar cada trayectoria de correa y mide la frecuencia de resonancia — frecuencias
    iguales significan tensión equilibrada.\n\nPara CoreXY, las trayectorias A y B
    deben estar dentro de unos pocos Hz entre sí.
