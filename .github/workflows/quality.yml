name: Code Quality

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install pinned tooling (clang-format) into .venv
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 3
        max_attempts: 3
        command: |
          # Install the EXACT pinned clang-format (and other tools) from
          # requirements.txt into .venv — the same single source of truth the
          # pre-commit hook uses (scripts/quality-checks.sh prefers
          # .venv/bin/clang-format). This guarantees CI formats byte-identically
          # to every dev machine, independent of the runner's system clang-format.
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/clang-format --version

    - name: Run quality checks
      timeout-minutes: 5
      run: |
        # Use shared script - single source of truth for pre-commit and CI
        chmod +x scripts/quality-checks.sh
        ./scripts/quality-checks.sh
