# HelixScreen Klipper include for the Sovol SV06 Ace (GitHub #986).
# Exposes the chamber/camera light so HelixScreen can toggle it via the LED
# controls. Pin value credited to onnlucky (Sovol community forums).
#
# NOTE(#986): verify this pin against YOUR board revision before relying on it.
# The gpiochip2/gpio3 mapping is the known forum value but may differ across
# SV06 Ace board revisions/firmware. If the light does not respond, check the
# correct gpiochip/line with `gpioinfo` on the printer host.
[output_pin cameralight]
pin: rpi:gpiochip2/gpio3
